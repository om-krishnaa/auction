{% extends 'public_panel/base.html' %}
{% load static %}

{% block content %}
<section class="py-5 bg-light">
    <div class="container">
        <h2 class="text-center mb-5">About Us</h2>

        {% for item in about_items %}
            <div class="content-wrapper {% if forloop.counter|divisibleby:2 %}flex-row-reverse{% endif %} mb-5">
                <div class="content-image">
                    {% if item.image %}
                        <img src="{{ item.image.url }}" alt="{{ item.title }}" class="img-fluid rounded shadow">
                    {% else %}
                        <img src="{% static 'images/placeholder.svg' %}" alt="Image Coming Soon" class="img-fluid rounded shadow">
                    {% endif %}
                </div>
                <div class="content-text">
                    <h3 class="mb-4">{{ item.title }}</h3>
                    <div class="description">
                        {{ item.description|linebreaks }}
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="text-center py-5">
                <p class="lead text-muted">Content coming soon...</p>
            </div>
        {% endfor %}
    </div>
</section>

<style>
    .content-wrapper {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4rem;
        padding: 2rem;
        flex-wrap: wrap;
    }

    .content-image {
        flex: 1;
        min-width: 300px;
    }

    .content-image img {
        width: 100%;
        height: auto;
        border-radius: 10px;
        transition: transform 0.3s ease;
    }

    .content-image img:hover {
        transform: scale(1.02);
    }

    .placeholder-image {
        background-color: #f8f9fa;
        border-radius: 10px;
        height: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #6c757d;
        border: 2px dashed #dee2e6;
    }

    .placeholder-image i {
        font-size: 4rem;
        margin-bottom: 1rem;
    }

    .placeholder-image p {
        font-size: 1.1rem;
        margin: 0;
    }

    .content-text {
        flex: 1;
        min-width: 300px;
    }

    .content-text h3 {
        color: #1e3c72;
        font-weight: bold;
    }

    .description {
        font-size: 1.1rem;
        line-height: 1.8;
        color: #4a5568;
    }

    @media (max-width: 768px) {
        .content-wrapper {
            flex-direction: column !important;
            text-align: center;
            gap: 2rem;
        }

        .content-text {
            margin-top: 1rem;
        }
    }
</style>
{% endblock %}

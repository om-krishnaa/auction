{% extends 'public_panel/base.html' %}
{% load static %}

{% block content %}
<div class="d-flex justify-content-center align-items-center vh-100" style="background-color: #f4f6f9; font-family: 'Public Sans', sans-serif;">
  <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%; border-radius: 12px;">
    <h4 class="mb-3 text-center fw-bold">Forgot Password 🔒</h4>
    <p class="mb-4 text-center">Enter your email address to receive a password reset link.</p>

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          placeholder="you@example.com"
          required
        />
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </div>
    </form>

    <div class="mt-3 text-center">
      <a href="{% url 'login' %}" class="text-decoration-none">← Back to Login</a>
    </div>
  </div>
</div>

<!-- Bootstrap 5 CSS & JS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}

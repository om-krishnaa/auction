{% extends 'public_panel/base.html'%}
{%load static%}
{% block content %}
<!-- Contact Form Section -->
<section class="py-5 bg-light">
  <div class="container">
    <h1 class="text-center alert alert-info">Contact Us</h1>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}

    <div class="row">
      <!-- Left Contact Info -->
      <div class="col-md-6 mb-4">
        <div class="mb-3 d-flex align-items-start">
          <i class="bi bi-geo-alt-fill text-primary fs-4 me-3"></i>
          <div>
            <h5 class="mb-1">Address</h5>
            <p class="mb-0">koteshwor-32 kathmandu</p>
          </div>
        </div>
        <div class="mb-3 d-flex align-items-start">
          <i class="bi bi-telephone-fill text-primary fs-4 me-3"></i>
          <div>
            <h5 class="mb-1">Phone number</h5>
            <p class="mb-0">9848000000</p>
          </div>
        </div>

        <div class="mb-3 d-flex align-items-start">
          <i class="bi bi-envelope-fill text-primary fs-4 me-3"></i>
          <div>
            <h5 class="mb-1">Email Us</h5>
            <p class="mb-0">eauction@gmail.com</p>
          </div>
        </div>

        <div>
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3533.1761255749902!2d85.33865377503744!3d27.680950826655984!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39eb19ecef2eedd1%3A0x668e25466241a9bd!2sKoteshwor%20Mahadevasthan!5e0!3m2!1sen!2snp!4v1745341745369!5m2!1sen!2snp" 
                  width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy" 
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="col-md-6">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <form method="POST" action="{% url 'contact' %}">
              {% csrf_token %}
              <div class="mb-3">
                <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" id="name" placeholder="Enter your full name" required>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control" id="email" placeholder="Enter your email" required>
              </div>

              <div class="mb-3">
                <label for="subject" class="form-label">Subject <span class="text-danger">*</span></label>
                <input type="text" name="subject" class="form-control" id="subject" placeholder="Enter the subject" required>
              </div>

              <div class="mb-3">
                <label for="message" class="form-label">Message <span class="text-danger">*</span></label>
                <textarea class="form-control" name="message" id="message" rows="4" placeholder="Enter your message" required></textarea>
              </div>

              <div class="text-center">
                <button type="submit" class="btn btn-primary px-5">
                  <i class="bi bi-send me-2"></i>Send Message
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
<!-- Bootstrap CSS & Icons (ensure these are in your <head>) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

{% extends 'admin_panel/base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="bi bi-exclamation-triangle text-warning display-1 mb-4"></i>
                    
                    <h2 class="mb-4">Confirm Deletion</h2>
                    
                    <p class="lead mb-4">
                        Are you sure you want to delete this {{ title|lower }}?
                        This action cannot be undone.
                    </p>

                    {% if object %}
                        <div class="alert alert-warning">
                            <strong>Title:</strong> {{ object.title }}
                        </div>
                    {% endif %}

                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url cancel_url %}" class="btn btn-secondary">
                                <i class="bi bi-x-lg"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
